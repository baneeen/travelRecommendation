<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     
    <link rel="stylesheet" href="./travel_recommendation.css">
    <link rel="stylesheet" href="./travel_recommendation_contact_us.css">
 
    <title>Contact Us</title>
     <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
    
            <!-- Logo & Company Name -->
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="logo.jpg" alt="Logo" class="logo">
                <span class="company-name">Travel Bloom</span>
            </a>
    
            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <!-- Navbar Content -->
            <div class="collapse navbar-collapse" id="navbarContent">
    
                <!-- Center Navigation -->
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link " href="index.html">Home</a>
                    </li>
    
                    <li class="nav-item">
                        <a class="nav-link" href="travel_recommendation_about_us.html">About Us</a>
                    </li>
    
                    <li class="nav-item active">
                        <a class="nav-link" href="#">Contact Us</a>
                    </li>
                </ul>
    
  
   

         
            </div>
    
        </div>
    </nav>
    <section class="contact-section">

        <div class="overlay"></div>
    
        <!-- Social Icons -->
        <div class="social-icons">
            <a href="#"><i class="bi bi-twitter-x"></i></a>
            <a href="#"><i class="bi bi-facebook"></i></a>
            <a href="#"><i class="bi bi-instagram"></i></a>
            <a href="#"><i class="bi bi-youtube"></i></a>
        </div>
    
        <div class="container">
    
            <div class="row align-items-center min-vh-100">
    
                <!-- Left Side -->
                <div class="col-lg-6 text-white">
    
                    <h1 class="contact-title">
                        CONTACT US
                    </h1>
    
                    <p class="contact-text">
                        Get in touch
                    </p>
    
                </div>
    
                <!-- Right Side -->
                <div class="col-lg-6">
    
                    <div class="contact-form">
    
                        <form>
    
                            <div class="mb-3">
                                <label class="form-label">Name</label>
    
                                <input
                                    type="text"
                                    class="form-control"
                                    placeholder="Your Name">
                            </div>
    
                            <div class="mb-3">
    
                                <label class="form-label">Email</label>
    
                                <input
                                    type="email"
                                    class="form-control"
                                    placeholder="name@email.com">
    
                            </div>
    
                            <div class="mb-4">
    
                                <label class="form-label">Message</label>
    
                                <textarea
                                    rows="6"
                                    class="form-control"
                                    placeholder="Enter your message"></textarea>
    
                            </div>
    
                            <button class="btn submit-btn w-100">
                                Submit
                            </button>
    
                        </form>
    
                    </div>
    
                </div>
    
            </div>
    
        </div>
    
    </section>
    

    </div>
   <!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
